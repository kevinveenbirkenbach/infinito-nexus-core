compose:
  services:
    oidc:
      enabled:            true
      shared:             true
    logout:
      enabled:            true
      shared: true
    dashboard:
      enabled:            true
      shared:             true
    matomo:
      enabled:            false
      shared:             false
    email:
      enabled: true
      shared: true
    postgres:
      enabled: true
      shared: true
    synapse: 
      version:            latest 
      image:              matrixdotorg/synapse
      name:               matrix-synapse
      backup:
        no_stop_required: true
    element:
      version:        latest
      image:          vectorim/element-web
      name:           matrix-element
    matrix-chatgpt-bot:
      version:        latest
      image:          ghcr.io/matrixgpt/matrix-chatgpt-bot
    css:
      enabled:        true
      shared: true
    prometheus:
      enabled: true
      shared: true
      native_metrics:
        enabled:     true
        port:        9000    # Synapse metrics listener port inside the container
        service_key: synapse  # compose service key differs from entity name "matrix"
      communication:
        channel:     true
  volumes:
    synapse:          "matrix_synapse_data"
playbook_tags:        "setup-all,start"                  # For the initial update use: install-all,ensure-matrix-users-created,start
server_name:          "{{ DOMAIN_PRIMARY }}"             # Adress for the account names etc.
setup:                false                              # Set true in inventory file to execute the setup and initializing procedures
server:
  csp:
    flags:
      script-src-attr:
        unsafe-eval:   true
      script-src-elem:
        unsafe-inline: true
        unsafe-eval:   true
      style-src-attr:
        unsafe-inline: true
    whitelist:
      connect-src:
        - "*"
      script-src-elem:
        - "element.{{ DOMAIN_PRIMARY }}"
        - "https://cdn.jsdelivr.net"
  domains:
    canonical:
      synapse: "matrix.{{ DOMAIN_PRIMARY }}"
      element: "element.{{ DOMAIN_PRIMARY }}"
  client_max_body_size: "15M"

plugins:
# You need to enable them in the inventory file
  chatgpt:    false
  facebook:   false
  immesage:   false
  instagram:  false
  signal:     false
  slack:      false
  telegram:   false
  whatsapp:   false
