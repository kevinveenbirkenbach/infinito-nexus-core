credentials: {}
compose:
  services:
    oauth2:
      enabled:  false
    # Keep Simple Icons standalone; consumers such as the dashboard can depend on it,
    # but the icon service should not pull the dashboard stack into single-app deploys.
    dashboard:
      enabled:  false
      shared:   false
    matomo:
      enabled:  false
      shared:   false
    redis:
      backup:
        disabled:   true
      enabled:      false   # Enable Redis 
    css:
      enabled: false
      shared: false
    recaptcha:
      enabled: false
    simpleicons:
      enabled:            false
      shared:             true
      image:              node
      version:            latest
      min_storage:        "1GB"
      cpus:               0.5
      mem_reservation:    126m
      mem_limit:          265m
      pids_limit:         126
    prometheus:
      enabled: true
      shared: true
server:
  csp: {}      
  domains:
    canonical:
      - "icon.{{ DOMAIN_PRIMARY }}"
    aliases: []
