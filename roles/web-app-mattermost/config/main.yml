server:
  csp:
    flags:
      script-src-elem:
        unsafe-inline:            true
      style-src-attr:
        unsafe-inline:            true
    whitelist: {}
  domains:
    aliases: []
    canonical:
      - mattermost.{{ DOMAIN_PRIMARY }}
  status_codes:
    default:                      [200, 301, 302, 405]
compose:
  services:
    oidc:
      enabled:                    true
      shared:                     true
    logout:
      enabled:                    true
      shared: true
    ldap:
      enabled:                    false
    dashboard:
      enabled:                    true
      shared: true
    matomo:
      enabled:                    true
      shared:                     true
    email:
      enabled: true
      shared: true
    postgres:
      enabled: true
      shared: true
    mattermost:
      image:                      "mattermost/mattermost-team-edition"
      version:                    "11.6.1"
      min_storage:                "10GB"
      backup:
        no_stop_required:         true
      name:                       "mattermost"
      cpus:                       "1.0"
      mem_reservation:            "512m"
      mem_limit:                  "1g"
      pids_limit:                 512
    oauth2:
      enabled:                    false
    redis:
      backup:
        disabled:                 true
      enabled:                    false
    css:
      enabled:                    true
      shared: true
    javascript:
      enabled:                    true
      shared: true
    prometheus:
      enabled: true
      shared: true
      native_metrics:
        enabled: false    # Requires Enterprise Edition — Team Edition compiles out the /metrics endpoint entirely
        port:    8067     # Mattermost metrics listener (MM_METRICSSETTINGS_LISTENADDRESS)
      communication:
        channel: true
  volumes:
    config:                       "mattermost_config"
    data:                         "mattermost_data"
    logs:                         "mattermost_logs"
    plugins:                      "mattermost_plugins"
    client-plugins:               "mattermost_client_plugins"
