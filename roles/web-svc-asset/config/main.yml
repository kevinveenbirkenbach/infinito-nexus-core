server:
  domains:
    canonical:
      - asset.{{ DOMAIN_PRIMARY }}
    aliases: []
compose:
  services:
    asset:
      enabled: false
      shared: true
      cpus:            "0.2"
      mem_reservation: "128m"
      mem_limit:       "256m"
      pids_limit:      128
      source_directory: "{{ playbook_dir }}/assets"
      url:              "//{{ lookup('domain', 'web-svc-file') }}/assets"
    # Assets are published through the shared file host under /assets.
    # Keep the file dependency here so consumers only depend on web-svc-asset.
    file:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    css:
      enabled: false
      shared: false
    prometheus:
      enabled: true
      shared: true
