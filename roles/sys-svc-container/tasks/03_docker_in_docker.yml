- name: Ensure '{{ SYS_SVC_DOCKER_DIR }}' exists
  file:
    path: "{{ SYS_SVC_DOCKER_DIR }}"
    state: directory
    mode: '0755'

- name: Install fuse-overlayfs in container
  ansible.builtin.package:
    name: fuse-overlayfs
    state: present
  notify: container manager restart

- name: Compute and set Docker daemon MTU (container)
  include_tasks: "_mtu.yml"

- name: Configure docker daemon storage driver (container)
  ansible.builtin.template:
    src: daemon.json.j2
    dest: "{{ SYS_SVC_DOCKER_DAEMON }}"
    mode: "0644"
  notify: container manager restart

# Clamp TCP MSS to PMTU so nested containers spawned via `docker run` (e.g. Discourse
# launcher rebuild) don't stall on `Recv failure: Connection reset by peer` when their
# bridge MTU (1500) exceeds the deployer eth0 MTU (automtu-picked, typically 1400).
# Without this, TCP packets forwarded from a 1500-MTU veth through the lower-MTU eth0
# hit PMTU blackholes because outer Docker NATs ICMP Frag Needed.
- name: Check if TCP MSS clamp to PMTU is already present (container)
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -C
      - FORWARD
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  register: mss_clamp_check
  changed_when: false
  failed_when: false

- name: Ensure TCP MSS clamping to PMTU on FORWARD (container)
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -A
      - FORWARD
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  when: mss_clamp_check.rc != 0
