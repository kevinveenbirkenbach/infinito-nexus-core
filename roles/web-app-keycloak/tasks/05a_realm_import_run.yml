- name: Stop Keycloak before one-shot realm import
  shell: |
    set -euo pipefail
    compose stop keycloak
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
    executable: /bin/bash
  changed_when: true

- name: Import Keycloak realm into the database
  shell: |
    set -euo pipefail
    compose run --rm --no-deps \
      --entrypoint /opt/keycloak/bin/kc.sh \
      keycloak import --file {{ KEYCLOAK_REALM_IMPORT_FILE_DOCKER }} --verbose
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
    executable: /bin/bash
  changed_when: true

- name: Start Keycloak after one-shot realm import
  shell: |
    set -euo pipefail
    compose up -d --force-recreate keycloak
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
    executable: /bin/bash
  changed_when: true

- name: Re-run login/bootstrap checks after one-shot realm import
  include_tasks: 04_login.yml
