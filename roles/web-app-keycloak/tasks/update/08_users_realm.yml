---
# Provision the administrator directly in the Keycloak realm when LDAP is
# disabled. In the reduced local loop we only need an interactive admin account
# for dashboard/OIDC login checks; broader user provisioning remains LDAP-driven
# or app-driven in the normal full-stack setup. Use Keycloak's configured admin
# credential so the seeded realm user and the login tests share the same secret.

- name: "Ensure administrator exists in realm '{{ KEYCLOAK_REALM }}' when LDAP is disabled"
  ansible.builtin.script: ensure_realm_user.sh
  args:
    chdir: "{{ role_path }}/files"
  environment:
    KEYCLOAK_EXEC_CONTAINER: "{{ KEYCLOAK_EXEC_CONTAINER }}"
    KEYCLOAK_KCADM: "{{ KEYCLOAK_KCADM }}"
    KEYCLOAK_REALM: "{{ KEYCLOAK_REALM }}"
    KEYCLOAK_USERNAME: "{{ lookup('users', 'administrator').username }}"
    KEYCLOAK_PASSWORD: "{{ lookup('users', 'administrator').password }}"
    KEYCLOAK_EMAIL: "{{ lookup('users', 'administrator').email }}"
    KEYCLOAK_FIRSTNAME: "{{ lookup('users', 'administrator').firstname }}"
    KEYCLOAK_LASTNAME: "{{ lookup('users', 'administrator').lastname }}"
    KEYCLOAK_USER_ENABLED: "true"
  register: kc_realm_user_sync
  changed_when: true
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
