- name: Check whether the imported realm already exists
  shell: >
    {{ KEYCLOAK_EXEC_KCADM }} get realms/{{ KEYCLOAK_REALM }}
  register: keycloak_imported_realm_probe
  changed_when: false
  failed_when: false

- name: Import realm with one-shot Keycloak import command when missing
  include_tasks: 05a_realm_import_run.yml
  when:
    - KEYCLOAK_REALM_IMPORT_ENABLED | bool
    - keycloak_imported_realm_probe.rc != 0
