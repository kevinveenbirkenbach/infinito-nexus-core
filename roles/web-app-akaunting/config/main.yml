company:
  name:             "Akaunting on {{ DOMAIN_PRIMARY | upper }}" # @todo load automatic based on service_provider infos, this will fail
  email:            "{{ lookup('users', 'administrator').email }}" # @todo load automatic based on service_provider infos, this will fail
setup_admin_email:  "{{ lookup('users', 'administrator').email }}"
server:
  domains:
    canonical:
      - "accounting.{{ DOMAIN_PRIMARY }}"
    aliases: []
  csp:
    flags:
      script-src-elem:
        unsafe-inline:  true
      script-src-attr:
        unsafe-inline:  true
        unsafe-eval:    true
      style-src-attr:
        unsafe-inline:  true
    whitelist:
      font-src:
        - "data:"
      connect-src:
        - https://akaunting.com
compose:
  services:
    logout:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    mariadb:
      enabled: true
      shared: true
    akaunting:
      backup:
        no_stop_required: true
      image:   docker.io/akaunting/akaunting 
      version: latest
      name:    akaunting
      min_storage: "8GB"
    redis:
      backup:
        disabled: true
      enabled: false # Set to true to activate redis for akaunting
    css:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
  volumes: 
    data: akaunting_data
credentials: {}
