- name: "create compose.yml for bigbluebutton"
  command:
    cmd: bash ./scripts/generate-compose
    chdir: "{{ docker_repository_path }}"
  environment:
    COMPOSE_HTTP_TIMEOUT: "600"
    DOCKER_CLIENT_TIMEOUT: "600"
- name: Slurp compose.yml from remote host
  slurp:
    src: "{{ BBB_COMPOSE_FILE_ORIGINE }}"
  register: compose_slurp
- name: Transform compose.yml with compose_mods
  copy:
    content: "{{ compose_slurp.content | b64decode | compose_mods(docker_repository_path, lookup('container', application_id, 'files.env')) }}"
    dest: "{{ BBB_COMPOSE_FILE_FINAL }}"
  notify:
    - compose up
- name: Prebuild etherpad image
  # On local testing environment errors exist if you don't prebuild.
  # --network=host: buildkit's private network fails to reach
  # registry.npmjs.org / raw.githubusercontent.com from inside the
  # nested infinito container; host-net inherits the outer container's
  # working network.
  command:
    cmd: compose build --network=host etherpad
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  when: RUNTIME == 'dev'
