---
- name: "Wait until PostgreSQL is ready"
  ansible.builtin.shell: >
    compose exec -T postgres
    pg_isready -U postgres
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  register: pg_ready
  retries: 20
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: "Wait for PostgreSQL to accept SQL after initdb restarts"
  ansible.builtin.shell: >
    compose exec -T postgres
    psql -U postgres -d postgres -tAc "SELECT 1;"
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  register: pg_sql_ready
  retries: 30
  delay: 2
  until: pg_sql_ready.rc == 0 and (pg_sql_ready.stdout | trim) == '1'
  changed_when: false

- name: "Ensure PostgreSQL password matches POSTGRESQL_SECRET"
  ansible.builtin.shell: >
    compose exec -T postgres
    psql -U postgres -d postgres
    -c "ALTER USER postgres WITH PASSWORD '{{ BBB_POSTGRESQL_SECRET }}';"
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  register: bbb_pg_alter
  retries: 20
  delay: 3
  until: bbb_pg_alter.rc == 0
  changed_when: false
