---
# run_once_sys_stk_front_proxy: deactivated

- name: Freeze front proxy context before nested role loads
  ansible.builtin.set_fact:
    front_proxy_application_id: "{{ application_id }}"
    front_proxy_domain: "{{ domain | default(lookup('domain', application_id)) }}"
    front_proxy_http_port: >-
      {{
        http_port
        | default((ports.localhost.http | default({})).get(application_id))
      }}
    front_proxy_domain_conf_dst_resolved: >-
      {{
        lookup(
          'nginx',
          'files.domain',
          (domain | default(lookup('domain', application_id)))
        )
      }}
  changed_when: false

- name: Bootstrap Frontend Base
  ansible.builtin.include_role:
    name: sys-stk-front-base

- name: "TLS | Apply tls layer"
  include_role:
    name: sys-front-tls
  when: lookup('tls', front_proxy_application_id, 'enabled') | bool
  vars:
    application_id: "{{ front_proxy_application_id }}"
    domain: "{{ front_proxy_domain }}"

- name: "CSP/INJ | Apply global injections for {{ front_proxy_domain }}"
  ansible.builtin.include_role:
    name: sys-front-inj-all
  vars:
    application_id: "{{ front_proxy_application_id }}"
    domain: "{{ front_proxy_domain }}"

- name: Resolve application-specific front proxy template path
  ansible.builtin.set_fact:
    front_proxy_application_template: "{{ front_proxy_application_id | abs_role_path_by_application_id }}/templates/proxy.conf.j2"

- name: Resolve front proxy template source
  ansible.builtin.set_fact:
    front_proxy_template_src: >-
      {{
        front_proxy_application_template
        if (
          lookup('fileglob', front_proxy_application_template, wantlist=True) | length
        ) > 0
        else "roles/sys-svc-proxy/templates/vhost/%s.conf.j2" | format(webserver_vhost_flavour)
      }}

- name: "Deploy NGINX config: '{{ front_proxy_domain }}' -> '{{ front_proxy_domain_conf_dst_resolved }}'"
  ansible.builtin.template:
    src: "{{ front_proxy_template_src }}"
    dest: "{{ front_proxy_domain_conf_dst_resolved }}"
  vars:
    application_id: "{{ front_proxy_application_id }}"
    domain: "{{ front_proxy_domain }}"
    http_port: "{{ front_proxy_http_port }}"
  register: nginx_conf
  notify: restart openresty

- block:
    - name: "Check if {{ lookup('domain', front_proxy_application_id) }} is reachable (only if config unchanged)"
      uri_probe:
        url: "{{ lookup('tls', front_proxy_application_id, 'url.base') }}"
        status_code:
          - 200
          - 301
          - 302
      register: site_check
      failed_when: false
      changed_when: false

    - name: Restart NGINX if site is down
      ansible.builtin.command:
        cmd: "true"
      notify: restart openresty
      when:
        - site_check.status is defined
        - site_check.status not in [200, 301, 302]
  when: not nginx_conf.changed

- name: "Restart Webserver for '{{ front_proxy_domain_conf_dst_resolved }}'"
  ansible.builtin.meta: flush_handlers
