---
# Reset Joomla admin password via CLI (inside the container).
# Immediately after a fresh install, `user:reset-password` can transiently
# report "The user <name> does not exist!" even though the user has been
# created and is queryable via `user:list` — observed consistently in CI.
# Joomla's CLI bootstraps a fresh session per invocation but Symfony's
# service container + autoloader warm-up plus the recent DB commit appear
# to race on first post-install invocation. A short retry loop with a
# small delay tolerates this without masking a genuine failure (a truly
# missing user keeps failing after all retries).
- name: "Reset Joomla admin password (non-interactive CLI)"
  command:
    argv:
      - docker
      - exec
      - "{{ JOOMLA_CONTAINER }}"
      - php
      - "{{ JOOMLA_CLI_FILE }}"
      - user:reset-password
      - "--username"
      - "{{ JOOMLA_USER_NAME }}"
      - "--password"
      - "{{ JOOMLA_USER_PASSWORD }}"
  register: j_password_reset
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: j_password_reset.rc == 0
  retries: 6
  delay: 5
  until: j_password_reset.rc == 0
