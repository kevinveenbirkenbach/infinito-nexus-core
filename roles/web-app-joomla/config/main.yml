server:
  domains:
    canonical:
      - "joomla.cms.{{ DOMAIN_PRIMARY }}"
    aliases: []
  csp:
    flags:
      style-src-attr:
        unsafe-inline: true
      script-src-elem:
        unsafe-inline: true
compose:
  services:
    oidc:
      enabled: false
      shared: false
    logout:
      enabled: true
      shared: true

    dashboard:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    mariadb:
      enabled: true
      shared: true
    joomla:
      image:    joomla
      # Pin to a stable release tag — the rolling `latest` tag has shipped a
      # raw git source tree, which makes the CLI installer refuse to run with
      # "It looks like you are trying to run Joomla! from our git repository."
      version:  "6.1.0-php8.3-apache"
      name:     joomla
      min_storage: "8GB"
      backup:
        no_stop_required: true
      upload:
        # MB Integer for upload size
        size_mb: 100
    css:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
  volumes:
    data:       "joomla_data"
