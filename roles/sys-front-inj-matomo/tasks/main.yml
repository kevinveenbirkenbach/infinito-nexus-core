# run_once_sys_front_inj_matomo: deactivated

# The Matomo API token may be empty on first deployment or when the Matomo container is
# already reachable but the bootstrap has not run yet (so sys-token-store never wrote the
# token file). In that case inj_enabled.matomo is set to false so the NGINX template skips
# the Matomo body snippet (avoiding 'matomo_site_id is undefined') and inject.yml is not run.
# See docs/contributing/design/exceptions.md — "Matomo Token Not Yet Available".

- name: "Disable Matomo in inj_enabled for '{{ domain }}' — token not yet available"
  ansible.builtin.set_fact:
    inj_enabled: "{{ inj_enabled | combine({'matomo': false}) }}"
  when: (lookup('users', 'administrator').tokens['web-app-matomo'] | default('') | string | trim) == ""

- name: "Inject Matomo tracking for '{{ domain }}'"
  include_tasks: inject.yml
  when: inj_enabled.matomo | bool
