# General
application_id:                   "web-app-dashboard"
DASHBOARD_APPLICATION_ID:         "web-app-dashboard"
http_port:                        "{{ ports.localhost.http[DASHBOARD_APPLICATION_ID] }}"

## Webserver
webserver_extra_configuration:        "{{ lookup('template', 'nginx/sso.html.conf.j2') }}"

# Dashboard

## Simpleicons
DASHBOARD_SIMPLEICONS_ENABLED:      "{{ lookup('config', DASHBOARD_APPLICATION_ID, 'compose.services.simpleicons.enabled') }}"
DASHBOARD_SIMPLEICONS_STATIC_SUBDIR: "simpleicons"
DASHBOARD_SIMPLEICONS_STATIC_DIR_HOST: "{{ [ lookup('container', DASHBOARD_APPLICATION_ID, 'directories.volumes'), DASHBOARD_SIMPLEICONS_STATIC_SUBDIR ] | path_join }}"
DASHBOARD_SIMPLEICONS_STATIC_DIR_CONTAINER: "{{ ['/app/static', DASHBOARD_SIMPLEICONS_STATIC_SUBDIR] | path_join }}"
# Use the direct local service port for sync/checks because the public
# Simple Icons domain currently redirects through the file service.
DASHBOARD_SIMPLEICONS_SYNC_URL_BASE: "{{ 'http://' ~ DOCKER_REACH_HOST ~ ':' ~ (ports.localhost.http['web-svc-simpleicons'] | string) ~ '/' }}"

## Javascript
DASHBOARD_JS_CDN_URL:               "{{ lookup('tls', 'web-svc-cdn', 'url.base') }}"
DASHBOARD_JS_FILES:                 ['iframe.js','oidc.js']
DASHBOARD_JS_BASE_PATH:             "{{ DASHBOARD_APPLICATION_ID | get_entity_name }}/js"
DASHBOARD_JS_SERVER_DIR:            "{{ [ lookup('nginx','directories.data.cdn'), DASHBOARD_JS_BASE_PATH ] | path_join }}"
DASHBOARD_JS_BASE_URL:              "{{ (DASHBOARD_JS_CDN_URL | trim('/')) ~ '/' ~ (DASHBOARD_JS_BASE_PATH | trim('/')) }}"

## Webserver
DASHBOARD_LOCATION_SILENT_CHECK:    "/silent-check-sso.html"

## Configuration
DASHBOARD_CONFIG_YML_SRC_FILE:      "config.yaml.j2"
DASHBOARD_CONFIG_INV_PATH:          "{{ [ inventory_dir, 'files', inventory_hostname ,'docker', DASHBOARD_APPLICATION_ID, DASHBOARD_CONFIG_YML_SRC_FILE] | path_join }}"
DASHBOARD_CONFIG_YML_DEST:          "{{ [ lookup('container', DASHBOARD_APPLICATION_ID, 'directories.volumes'), 'config.yaml' ] | path_join }}"
DASHBOARD_CONFIG_YML_DOCKER_DEST:   "/app/config.yaml"

## OIDC
DASHBOARD_APP_BASE_URL:            "{{ lookup('tls', DASHBOARD_APPLICATION_ID, 'url.base') | regex_replace('/+$', '') }}/"
DASHBOARD_KEYCLOAK_LOGIN_URL: >-
  {{ OIDC.CLIENT.AUTHORIZE_URL
     ~ '?client_id=' ~ OIDC.CLIENT.ID
     ~ '&response_type=code'
     ~ '&scope=openid%20profile%20email'
     ~ '&redirect_uri=' ~ (DASHBOARD_APP_BASE_URL | urlencode) }}
DASHBOARD_KEYCLOAK_IFRAME_ENABLED:  "{{ lookup('config','web-app-keycloak', 'compose.services.dashboard.enabled') }}"
DASHBOARD_OIDC_ENABLED:             "{{ lookup('config', DASHBOARD_APPLICATION_ID, 'compose.services.oidc.enabled') }}"

## Docker
DASHBOARD_CONTAINER:                "{{ lookup('config', DASHBOARD_APPLICATION_ID, 'compose.services.dashboard.name') }}"
DASHBOARD_IMAGE:                    "{{ lookup('config', DASHBOARD_APPLICATION_ID, 'compose.services.dashboard.image') }}"
DASHBOARD_VERSION:                  "{{ lookup('config', DASHBOARD_APPLICATION_ID, 'compose.services.dashboard.version') }}"
