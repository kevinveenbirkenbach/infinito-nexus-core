server:
  csp:
    whitelist:
      script-src-elem:
        - https://cdn.jsdelivr.net
        - https://kit.fontawesome.com
        - https://code.jquery.com/
      style-src-elem:
        - https://cdn.jsdelivr.net
        - https://kit.fontawesome.com
        - https://code.jquery.com/
      font-src:
        - https://ka-f.fontawesome.com
        - https://cdn.jsdelivr.net
      connect-src:
        - https://ka-f.fontawesome.com
        - https://cdn.jsdelivr.net
        - "auth.{{ DOMAIN_PRIMARY }}" 
      frame-src:
        - "*.{{ DOMAIN_PRIMARY }}"
    flags:
      script-src-attr:
        unsafe-inline: true
  domains:
    canonical:
      - "dashboard.{{ DOMAIN_PRIMARY }}"
    aliases: []
compose: 
  services:
    oidc:
      enabled:  true
      shared:   true
    asset:
      enabled:  true
      shared:   true
    cdn:
      enabled:  true
      shared:   true
    simpleicons:
      enabled:  true
      shared:   true
    logout:
      enabled:  true
      shared: true
    matomo:
      enabled:  true
      shared:   true
    dashboard:
      enabled:  false
      shared:   true
      name:     "dashboard"
      image:    "ghcr.io/kevinveenbirkenbach/port-ui"
      version:  "1.1.0"
      min_storage: "1GB"
      cpus:            "0.3"
      mem_reservation: "256m"
      mem_limit:       "512m"
      pids_limit:      256
    css:
      enabled: true
      shared: true
    javascript:
      enabled: true
      shared: true
    # noqa: email
    email:
      enabled: false
      shared: false
    prometheus:
      enabled: true
      shared: true
