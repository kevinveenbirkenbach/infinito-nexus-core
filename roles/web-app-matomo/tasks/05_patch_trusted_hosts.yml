- name: "Matomo | Set trusted hosts (domain + service + container reach host)"
  vars:
    # Pin application_id task-locally to shield against nested include_role chains
    # (sys-stk-front-base → web-opt-rdr-domains / svc-prx-openresty) that pollute
    # the role-vars layer and make {{ MATOMO_* }} resolve against the wrong
    # application_id. The domain lookup is inlined as a literal below because
    # a task-local `domain:` override does NOT shield against eager evaluation
    # of the role-layer `domain = lookup('domain', application_id)` template.
    application_id: "web-app-matomo"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - --user
      - root
      - "{{ MATOMO_NAME }}"
      - sh
      - -lc
      - |
        set -eu
        CFG="{{ MATOMO_CONFIG }}"
        DOMAIN="{{ lookup('domain', 'web-app-matomo') }}"
        SERVICE="{{ MATOMO_SERVICE }}"
        LOCAL="{{ DOCKER_REACH_HOST }}:{{ http_port }}"

        ensure_host() {
          host="$1"
          if ! grep -qE "^trusted_hosts\\[\\][[:space:]]*= \"${host}\"$" "$CFG"; then
            awk -v host="$host" '
              BEGIN{added=0}
              /^\[General\]$/ { print; next }
              /^trusted_hosts\[\][[:space:]]*=/ && !added {
                print
                print "trusted_hosts[] = \""host"\""
                added=1
                next
              }
              { print }
              END{
                if (!added) {
                  print "[General]"
                  print "trusted_hosts[] = \""host"\""
                }
              }
            ' "$CFG" > "$CFG.tmp" && mv "$CFG.tmp" "$CFG"
          fi
        }

        # Keep your "first trusted_hosts[] = DOMAIN" behavior
        sed -i "0,/^trusted_hosts\\[\\].*/s//trusted_hosts[] = \"${DOMAIN}\"/" "$CFG"

        # Ensure additional trusted hosts exist
        ensure_host "$SERVICE"
        ensure_host "$LOCAL"
  notify: compose up
