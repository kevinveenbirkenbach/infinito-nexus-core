# SPOT: global loader for all shared services.
#
# Called from tasks/stages/01_constructor.yml before the normal server app pass.

- name: "Discover ordered shared services"
  ansible.builtin.set_fact:
    _ordered_services: >-
      {{
        query(
          'service_registry',
          'ordered',
          roles_dir=([ playbook_dir, 'roles' ] | path_join)
        ) | first
      }}

- name: "Load shared service"
  include_tasks: load_service.yml
  vars:
    service_key: "{{ service_item.id }}"
    service_role: "{{ service_item.role }}"
    service_run_once_var: "{{ 'run_once_' ~ (service_item.role | replace('-', '_')) }}"
  when:
    - lookup('vars', service_run_once_var, default='__missing__') == '__missing__'
    - lookup('service', service_item.id).required | bool
  loop: "{{ _ordered_services }}"
  loop_control:
    loop_var: service_item
    label: "{{ service_item.id }}"
