server:
  domains:
    canonical: 
      - "flow.ai.{{ DOMAIN_PRIMARY }}"
    aliases: []
  csp:
    flags:
      script-src-elem:
        unsafe-inline:  true
        unsafe-eval: true
    whitelist:
      font-src:
        - https://fonts.gstatic.com  # nocheck: url
      style-src-elem:
        - https://fonts.googleapis.com  # nocheck: url
      script-src-elem:
        - https://fonts.googleapis.com  # nocheck: url
        - https://fonts.gstatic.com  # nocheck: url
        - https://r.wdfl.co  # nocheck: url
      connect-src: []
compose:
  services:
    logout:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared:  true
    litellm:
      backup:
        no_stop_required: true
      image:              ghcr.io/berriai/litellm
      version:            main-v1.77.3.dynamic_rates
      name:               litellm
      cpus:               "1.0"
      mem_reservation:    "0.5g"
      mem_limit:          "1g"
      pids_limit:         1024
    qdrant:
      backup:
        no_stop_required: true
      image:              qdrant/qdrant
      version:            latest
      name:               qdrant
      cpus:               "2.0"
      mem_reservation:    "2g"
      mem_limit:          "4g"
      pids_limit:         2048
    flowise:
      backup:
        no_stop_required: false # As long as SQLite is used
      image:              flowiseai/flowise
      version:            latest
      name:               flowise
      min_storage:        "10GB"
      cpus:               "1.0"
      mem_reservation:    "1g"
      mem_limit:          "2g"
      pids_limit:         1024
    redis:
      backup:
        disabled: true
      enabled: false
    ollama:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
    javascript:
      enabled: false
      shared: true
    email:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
  volumes: 
    qdrant:     qdrant_data
    flowise:    flowise_data
credentials: {}
