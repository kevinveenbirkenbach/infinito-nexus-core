server:
  csp:
    flags:
      script-src-elem:
        unsafe-inline:  true
      script-src-attr:
        unsafe-inline:  true
      style-src-attr:
        unsafe-inline:  true
    whitelist:
      frame-ancestors:
        - "*"
      media-src:
        - "blob:"
      font-src:
        - "data:"
  domains:
    canonical:
      - "video.{{ DOMAIN_PRIMARY }}"
    aliases: []
    
compose:
  services:
    oidc:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    # noqa: shared
    redis:
      backup:
        disabled: true
      enabled: true
      cpus: "0.5"
      mem_reservation: "256m"
      mem_limit: "512m"
      pids_limit: 512
    postgres:
      enabled: true
      shared: true
    peertube:
      name:             "peertube"
      # Pin to an explicit release tag instead of a mutable rolling tag
      # (e.g. `production-bookworm`): CI has seen rolling-tag drift regress
      # the fresh-install bootstrap with `null value in column "nodeVersion"
      # of relation "application" violates not-null constraint` on the first
      # migration run, crash-looping the container and blocking the OIDC
      # plugin install. Bump this tag explicitly when upgrading PeerTube;
      # see https://github.com/Chocobozzz/PeerTube/releases for the latest.
      version:          "v8.1.5"
      image:            "chocobozzz/peertube"
      min_storage:      "30GB"
      backup:
        no_stop_required: true
      cpus: 4
      mem_reservation:  "4g"
      mem_limit:        "8g"
      pids_limit:       2048  # ffmpeg spawnt Threads/Prozesse
    css:
      enabled: false
      shared: true
    prometheus:
      enabled: true
      shared: true
  volumes:
    data: peertube_data
    config: peertube_config
