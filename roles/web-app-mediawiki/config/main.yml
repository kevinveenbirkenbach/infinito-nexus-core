sitename:       "Wiki on {{ DOMAIN_PRIMARY | upper }}"
server:
  domains:
    canonical:
      - "m.wiki.{{ DOMAIN_PRIMARY }}"
    aliases: []
  csp:
    flags:
      script-src-elem:
        unsafe-inline:  true

compose:
  services:
    oidc:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    mariadb:
      enabled: true
      shared: true
    mediawiki: 
      image:    mediawiki
      version:  "1.45"
      min_storage:  "8GB"
      backup:
        no_stop_required: true
      name:     mediawiki
    css:
      enabled: false
      shared: true
    prometheus:
      enabled: true
      shared: true
  volumes:
    images:     mediawiki_images
    extensions: mediawiki_extensions
