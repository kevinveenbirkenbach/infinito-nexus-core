compose:
  services:
    oidc:
      enabled: true
      shared: true
    ldap:
      enabled: false
      shared: true
    oauth2:
      enabled: false
      origin:
        host: "gateway"
        port: "80"
    logout:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    postgres:
      enabled: true
      shared: true
    taiga:
      version:        "latest"
      min_storage:    "10GB"
      cpus:            "1.0"
      mem_reservation: "1g"
      mem_limit:       "1.5g"
      pids_limit:      512
    async:
      cpus:            "1.0"
      mem_reservation: "1g"
      mem_limit:       "1.5g"
      pids_limit:      512
    front:
      cpus:            "0.3"
      mem_reservation: "256m"
      mem_limit:       "512m"
      pids_limit:      256
    gateway:
      cpus:            "0.3"
      mem_reservation: "256m"
      mem_limit:       "512m"
      pids_limit:      256
    events:
      cpus:            "0.3"
      mem_reservation: "256m"
      mem_limit:       "512m"
      pids_limit:      256
    async-rabbitmq:
      cpus:            "1.0"
      mem_reservation: "1g"
      mem_limit:       "1.5g"
      pids_limit:      512
    events-rabbitmq:
      cpus:            "0.5"
      mem_reservation: "512m"
      mem_limit:       "1g"
      pids_limit:      512
    manager:
      cpus:             "0.5"
      mem_reservation:  "512m"
      mem_limit:        "1g"
      pids_limit:       256
    protected:
      cpus:            "0.2"
      mem_reservation: "128m"
      mem_limit:       "256m"
      pids_limit:      128
    css:
      enabled: true
      shared: true
    javascript:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
server:
  csp:
    flags:
      script-src-elem:
        unsafe-inline: true
        unsafe-eval:   true
      style-src-attr:
        unsafe-inline: true
      script-src-attr:
        unsafe-eval:   true
  domains:
    canonical:
      - "taiga.kanban.{{ DOMAIN_PRIMARY }}"
